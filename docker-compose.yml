version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      # Montage pour développement (reload à chaud)
      - .:/usr/share/nginx/html
    container_name: velvet-web

  # Simule une API externe (optionnel - pour démontrer votre compréhension)
  mock-api:
    image: kennethreitz/httpbin
    ports:
      - "8081:80"
    container_name: velvet-mock-api